# Multi-Task Training Configuration - RAG + LoRA Approach
# Trains model on REASONING, not MEMORIZATION
# CVE facts come from vector database, model learns security analysis

# Model settings
model_name: "Qwen/Qwen2.5-7B-Instruct"

# Data paths (RAG-focused training data)
train_data_path: "vuln_data/rag_training_data/train.jsonl"
val_data_path: "vuln_data/rag_training_data/val.jsonl"
max_seq_length: 1024  # Higher than before (context + query)

# Training hyperparameters
num_epochs: 5  # More epochs since less data
per_device_train_batch_size: 1
per_device_eval_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
warmup_steps: 500
max_grad_norm: 1.0
weight_decay: 0.01

# Multi-task weights (adjusted for RAG focus)
task_weights:
  CLASSIFY: 0.25        # More data available
  CVE_LOOKUP: 0.25      # Less critical (retrieval handles this)
  CODE_ANALYSIS: 0.35   # Focus here (reasoning about vulnerabilities)
  FIX: 0.15            # Remediation patterns

# DeepSpeed settings
use_deepspeed: true
deepspeed_config: "config/deepspeed_zero3_config.json"

# Checkpointing
output_dir: "checkpoints/qwen-security-expert-rag"
save_steps: 2000
save_total_limit: 3

# Logging
logging_steps: 100
eval_steps: 2000
use_wandb: false
wandb_project: "qwen-multitask-security-rag"

# Optimization (FULL PRECISION with ZeRO-3)
fp16: true
optim: "adamw_torch"
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8

# NO quantization for ZeRO-3 (full precision)
use_quantization: false

# Memory optimizations
gradient_checkpointing: true
use_flash_attention_2: true

# LoRA settings (higher rank for better quality)
use_lora: true
lora_r: 32  # Higher rank (more params but better reasoning)
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# DataLoader optimizations
seed: 42
dataloader_num_workers: 12
prefetch_factor: 4
persistent_workers: true

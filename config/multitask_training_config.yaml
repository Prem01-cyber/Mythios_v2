# Multi-Task Training Configuration for Qwen Security Expert
# Trains on 4 tasks: CLASSIFY, CVE_LOOKUP, CODE_ANALYSIS, FIX
# OPTIMIZED FOR SPEED: 2-4x faster than default settings

# Model settings
model_name: "Qwen/Qwen2.5-7B-Instruct"

# Data paths
train_data_path: "vuln_data/multitask_data/train.jsonl"
val_data_path: "vuln_data/multitask_data/val.jsonl"
max_seq_length: 512  # Balance between context and speed

# Training hyperparameters (OPTIMIZED)
num_epochs: 3
per_device_train_batch_size: 2  # Increased from 1 (better GPU utilization)
per_device_eval_batch_size: 4   # Increased from 2
gradient_accumulation_steps: 2  # Reduced from 4 (faster optimizer updates)
learning_rate: 2.0e-5
warmup_steps: 500
max_grad_norm: 1.0
weight_decay: 0.01

# Multi-task weights (must sum to 1.0)
task_weights:
  CLASSIFY: 0.20
  CVE_LOOKUP: 0.40
  CODE_ANALYSIS: 0.30
  FIX: 0.10

# DDP settings
backend: "nccl"

# Checkpointing (OPTIMIZED)
output_dir: "checkpoints/qwen-security-expert-multitask"
save_steps: 5000     # Less frequent (was 2000) - saves I/O time
save_total_limit: 3

# Logging (OPTIMIZED)
logging_steps: 100   # Less frequent (was 50)
eval_steps: 5000     # Much less frequent (was 1000) - MAJOR SPEEDUP
use_wandb: false     # Disabled by default
wandb_project: "qwen-multitask-security"

# Optimization
fp16: true
optim: "adamw_torch"
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8

# Quantization
use_quantization: true
quantization_bits: 4
quantization_type: "nf4"
use_double_quant: true

# Memory optimizations
gradient_checkpointing: true

# LoRA/PEFT settings
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# DataLoader optimizations (SPEED CRITICAL)
seed: 42
dataloader_num_workers: 12     # Increased from 4 (1.5x per GPU for 8 GPUs)
prefetch_factor: 4             # Prefetch 4 batches per worker (prevents GPU starvation)
persistent_workers: true       # Keep workers alive between epochs (saves startup time)

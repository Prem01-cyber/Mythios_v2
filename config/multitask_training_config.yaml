# Multi-Task Training Configuration for Qwen Security Expert
# Trains on 4 tasks: CLASSIFY, CVE_LOOKUP, CODE_ANALYSIS, FIX

# Model settings
model_name: "Qwen/Qwen2.5-7B-Instruct"

# Data paths (multi-task data)
train_data_path: "vuln_data/multitask_data/train.jsonl"
val_data_path: "vuln_data/multitask_data/val.jsonl"
max_seq_length: 2048

# Training hyperparameters
num_epochs: 3
per_device_train_batch_size: 2
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4  # Effective batch = 2 * 4 GPUs * 4 = 32
learning_rate: 2.0e-5
warmup_steps: 500
max_grad_norm: 1.0
weight_decay: 0.01

# Multi-task specific settings
# Task weights for loss calculation (must sum to 1.0)
task_weights:
  CLASSIFY: 0.20        # Binary classification
  CVE_LOOKUP: 0.40      # CVE identification (highest priority)
  CODE_ANALYSIS: 0.30   # Deep analysis
  FIX: 0.10            # Remediation

# DDP settings
backend: "nccl"

# Checkpointing
output_dir: "checkpoints/qwen-security-expert-multitask"
save_steps: 2000
save_total_limit: 3

# Logging
logging_steps: 50
eval_steps: 1000
use_wandb: true
wandb_project: "qwen-multitask-security"

# Optimization
fp16: true
optim: "adamw_torch"
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8

# Other
seed: 42
dataloader_num_workers: 4

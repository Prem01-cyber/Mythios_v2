name: snmpwalk
version: "5.9.1"
category: network_enumeration
description: "SNMP enumeration tool for discovering device information, network configuration, and system details via SNMP protocol"

capabilities:
  - snmp_enumeration
  - device_discovery
  - system_information
  - network_interface_enumeration
  - user_enumeration
  - process_enumeration
  - software_inventory
  - routing_table_discovery
  - arp_table_discovery
  - tcp_udp_connections
  - snmpv1_support
  - snmpv2c_support
  - snmpv3_support
  - community_string_testing
  - oid_traversal

target_compatibility:
  os: [linux, macos, windows]
  versions:
    linux: ["Ubuntu 16.04+", "Debian 9+", "Kali 2018+", "CentOS 7+"]
    macos: ["macOS 10.12+"]
    windows: ["Windows 10+", "Windows Server 2012+"]
  architecture: [x86_64, i686]
  target_systems: ["Network devices", "Printers", "IoT devices", "Servers with SNMP"]

commands:
  - name: basic_walk
    description: "Basic SNMP walk with community string"
    template: "snmpwalk -v{version} -c {community} {target}"
    parameters:
      version: {type: str, default: "2c", description: "SNMP version (1, 2c, 3)"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmpwalk -v2c -c public 10.10.10.10"
    
  - name: walk_specific_oid
    description: "Walk specific OID branch"
    template: "snmpwalk -v{version} -c {community} {target} {oid}"
    parameters:
      version: {type: str, default: "2c"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
      oid: {type: str, required: true}
    example: "snmpwalk -v2c -c public 10.10.10.10 1.3.6.1.2.1.1"
    
  - name: system_info
    description: "Get system information (hostname, location, contact)"
    template: "snmpwalk -v{version} -c {community} {target} system"
    parameters:
      version: {type: str, default: "2c"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmpwalk -v2c -c public 10.10.10.10 system"
    
  - name: network_interfaces
    description: "Enumerate network interfaces"
    template: "snmpwalk -v{version} -c {community} {target} interfaces"
    parameters:
      version: {type: str, default: "2c"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmpwalk -v2c -c public 10.10.10.10 interfaces"
    
  - name: running_processes
    description: "List running processes"
    template: "snmpwalk -v{version} -c {community} {target} 1.3.6.1.2.1.25.4.2.1.2"
    parameters:
      version: {type: str, default: "2c"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmpwalk -v2c -c public 10.10.10.10 1.3.6.1.2.1.25.4.2.1.2"
    
  - name: installed_software
    description: "List installed software"
    template: "snmpwalk -v{version} -c {community} {target} 1.3.6.1.2.1.25.6.3.1.2"
    parameters:
      version: {type: str, default: "2c"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmpwalk -v2c -c public 10.10.10.10 1.3.6.1.2.1.25.6.3.1.2"
    
  - name: user_accounts
    description: "Enumerate user accounts"
    template: "snmpwalk -v{version} -c {community} {target} 1.3.6.1.4.1.77.1.2.25"
    parameters:
      version: {type: str, default: "2c"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmpwalk -v2c -c public 10.10.10.10 1.3.6.1.4.1.77.1.2.25"
    
  - name: tcp_connections
    description: "List active TCP connections"
    template: "snmpwalk -v{version} -c {community} {target} tcp"
    parameters:
      version: {type: str, default: "2c"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmpwalk -v2c -c public 10.10.10.10 tcp"
    
  - name: udp_connections
    description: "List active UDP connections"
    template: "snmpwalk -v{version} -c {community} {target} udp"
    parameters:
      version: {type: str, default: "2c"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmpwalk -v2c -c public 10.10.10.10 udp"
    
  - name: snmpv3_auth
    description: "SNMPv3 with authentication"
    template: "snmpwalk -v3 -u {username} -l authPriv -a {auth_protocol} -A {auth_pass} -x {priv_protocol} -X {priv_pass} {target}"
    parameters:
      username: {type: str, required: true}
      auth_protocol: {type: str, default: "SHA", description: "MD5 or SHA"}
      auth_pass: {type: str, required: true, sensitive: true}
      priv_protocol: {type: str, default: "AES", description: "DES or AES"}
      priv_pass: {type: str, required: true, sensitive: true}
      target: {type: ip, required: true}
    example: "snmpwalk -v3 -u admin -l authPriv -a SHA -A authpass -x AES -X privpass 10.10.10.10"
    
  - name: bulk_walk
    description: "Faster bulk walk (SNMPv2c/v3 only)"
    template: "snmpbulkwalk -v{version} -c {community} {target}"
    parameters:
      version: {type: str, default: "2c"}
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmpbulkwalk -v2c -c public 10.10.10.10"
    
  - name: snmp_check
    description: "Comprehensive SNMP enumeration (uses snmp-check tool)"
    template: "snmp-check -c {community} {target}"
    parameters:
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmp-check -c public 10.10.10.10"
    
  - name: snmp_check_verbose
    description: "Verbose SNMP enumeration with all details"
    template: "snmp-check -c {community} -v {target}"
    parameters:
      community: {type: str, default: "public"}
      target: {type: ip, required: true}
    example: "snmp-check -c public -v 10.10.10.10"

output_format:
  type: text
  log_format: text
  supports_json: false
  format: "OID = VALUE pairs"

requires_auth: false
requires_root: false
ports_required: [161]

supersedes: []
complements: [nmap, onesixtyone, snmpset]

known_issues:
  - issue: "Requires correct community string (often 'public' or 'private')"
    impact: high
    workaround: "Bruteforce community strings with onesixtyone or hydra"
  - issue: "Many modern devices disable SNMP or use SNMPv3"
    impact: medium
    workaround: "Try SNMPv3 with credentials if available"
  - issue: "Full walks can take significant time on large MIBs"
    impact: low
    workaround: "Use snmpbulkwalk for faster enumeration or target specific OIDs"
  - issue: "Some OIDs require write community string"
    impact: low
    workaround: "Use read-only community for enumeration"

success_indicators:
  - "iso\\.[0-9.]+.*=.*"
  - "SNMPv2-MIB::sysDescr"
  - "SNMPv2-MIB::sysName"
  - "IF-MIB::ifDescr"
  - "HOST-RESOURCES-MIB::"
  - "hrSystem"
  - "hrStorage"
  - "System information"
  - "Network interfaces"

failure_indicators:
  - "Timeout"
  - "No response"
  - "No Such Object"
  - "Authentication failure"
  - "Connection refused"
  - "snmpwalk: Timeout"
  - "Unknown user name"
  - "Wrong digest"
  - "noSuchName"

installation:
  apt: "apt install snmp snmp-mibs-downloader"
  yum: "yum install net-snmp net-snmp-utils"
  brew: "brew install net-snmp"
  additional_tools:
    - "snmp-check: apt install snmp-check"
    - "onesixtyone: apt install onesixtyone (for community string bruteforce)"
  verify: "snmpwalk -v 2>&1 | grep 'Version:'"
  post_install:
    - "Download MIBs: download-mibs"
    - "Edit /etc/snmp/snmp.conf: comment out 'mibs :' line"
    - "Test: snmpwalk -v2c -c public localhost"

effectiveness_baseline:
  success_rate: 0.70
  avg_execution_time: 60
  false_positive_rate: 0.05
  resource_usage: low
  reliability: high
  notes: "Success highly dependent on SNMP being enabled and knowing correct community string; extremely valuable when successful"
